# Property Maintenance Agent - Railway Deployment Configuration
# https://docs.railway.app/deployments/projects/config

[build]
builder = "DOCKER"
plan = "standard"
dockerfile = "Dockerfile"

# Force redeploy - moved repo out of backend folder

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
